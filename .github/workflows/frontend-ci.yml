name: Frontend CI

on:
  push:
    paths:
      - "hlm-frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "hlm-frontend/**"
      - ".github/workflows/frontend-ci.yml"

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Prevent failure if frontend folder doesn't exist yet
    if: ${{ hashFiles('hlm-frontend/package.json') != '' }}

    defaults:
      run:
        working-directory: hlm-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: hlm-frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build
