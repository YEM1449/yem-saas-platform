name: Frontend CI

on:
  push:
    paths:
      - "hlm-frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "hlm-frontend/**"
      - ".github/workflows/frontend-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: frontend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test + Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: hlm-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: hlm-frontend/package-lock.json

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome-keyring.gpg] https://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable
        working-directory: ${{ github.workspace }}

      - name: Install deps
        run: npm ci

      - name: Run unit tests (CI mode + coverage)
        env:
          CHROME_BIN: /usr/bin/google-chrome-stable
        run: npm test -- --watch=false --browsers=ChromeHeadlessCI --code-coverage --progress=false

      - name: Build
        run: npm run build

      - name: Upload coverage artifact
        if: always() && hashFiles('hlm-frontend/coverage/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: hlm-frontend/coverage/**
          if-no-files-found: warn
