name: Dependency Review

# Requires GitHub Advanced Security (GHAS) + Dependency Graph enabled.
# - Public repos: free — enable at Settings > Security > Code scanning.
# - Private repos: requires GHAS license — contact GitHub sales.
# Until GHAS is enabled, the job runs with continue-on-error: true so PRs are not blocked.

on:
  pull_request:
    paths:
      - "hlm-backend/pom.xml"
      - "hlm-frontend/package.json"
      - "hlm-frontend/package-lock.json"
      - ".github/workflows/dependency-review.yml"

permissions:
  contents: read

concurrency:
  group: dependency-review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Review Dependency Changes
    runs-on: ubuntu-latest
    # continue-on-error: GHAS + Dependency Graph must be enabled in repo settings.
    # Remove this line once GitHub Advanced Security is active on this repository.
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
