name: Secret Scan (Audit)

on:
  push:
    paths:
      - "hlm-backend/**"
      - "hlm-frontend/**"
      - ".github/workflows/secret-scan.yml"
  pull_request:
    paths:
      - "hlm-backend/**"
      - "hlm-frontend/**"
      - ".github/workflows/secret-scan.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-audit:
    name: Lightweight Secret Pattern Scan (Audit-Only)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan for common secret patterns
        shell: bash
        run: |
          set +e
          mkdir -p .artifacts
          PATTERN='(AKIA[0-9A-Z]{16}|ASIA[0-9A-Z]{16}|-----BEGIN (RSA|EC|OPENSSH) PRIVATE KEY-----|xox[baprs]-[0-9A-Za-z-]{10,80}|ghp_[0-9A-Za-z]{36}|AIza[0-9A-Za-z\-_]{35})'
          grep -RInE --binary-files=without-match \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            --exclude-dir=target \
            --exclude-dir=dist \
            --exclude-dir=.artifacts \
            "${PATTERN}" . > .artifacts/secret-scan-findings.txt
          status=$?
          if [ "${status}" -eq 0 ]; then
            echo "::warning title=Potential secrets detected::Review .artifacts/secret-scan-findings.txt"
          elif [ "${status}" -eq 1 ]; then
            echo "No known secret patterns found."
          else
            echo "::warning title=Secret scan execution warning::Pattern scan did not complete cleanly."
          fi
          exit 0

      - name: Upload secret scan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-findings
          path: .artifacts/secret-scan-findings.txt
          if-no-files-found: warn
