name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Force all JavaScript actions to use Node.js 24 (Node 20 deprecated June 2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for CI
        run: |
          cat > .env << 'EOF'
          JWT_SECRET=ci-e2e-test-secret-not-for-production-x32c
          CORS_ALLOWED_ORIGINS=http://localhost:4200,http://127.0.0.1:4200
          EOF

      - name: Start infrastructure (postgres, redis, minio)
        run: docker compose up -d postgres redis minio

      - name: Wait for infrastructure health
        run: |
          for i in $(seq 1 24); do
            PG=$(docker inspect --format='{{.State.Health.Status}}' hlm-postgres 2>/dev/null || echo "missing")
            RD=$(docker inspect --format='{{.State.Health.Status}}' hlm-redis 2>/dev/null || echo "missing")
            echo "[$i/24] postgres=$PG redis=$RD"
            [ "$PG" = "healthy" ] && [ "$RD" = "healthy" ] && echo "Infrastructure ready" && break
            sleep 5
          done

      - name: Start backend
        run: docker compose up -d hlm-backend

      - name: Wait for backend — dump logs on failure
        run: |
          echo "Waiting for backend health (max 5 min)..."
          for i in $(seq 1 30); do
            STATE=$(docker inspect --format='{{.State.Status}}' hlm-backend 2>/dev/null || echo "gone")
            HEALTH=$(docker inspect --format='{{.State.Health.Status}}' hlm-backend 2>/dev/null || echo "none")
            echo "[$i/30] state=$STATE health=$HEALTH"
            if [ "$HEALTH" = "healthy" ]; then
              echo "Backend is healthy"
              break
            fi
            if [ "$STATE" = "exited" ] || [ "$STATE" = "dead" ]; then
              echo "Backend crashed — logs:"
              docker logs hlm-backend 2>&1 | tail -100
              exit 1
            fi
            if [ "$i" -eq 30 ]; then
              echo "Backend timed out — logs:"
              docker logs hlm-backend 2>&1 | tail -100
              exit 1
            fi
            sleep 10
          done

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: hlm-frontend/package-lock.json

      - name: Install dependencies
        run: cd hlm-frontend && npm ci

      - name: Install Playwright browsers
        run: cd hlm-frontend && npx playwright install chromium --with-deps

      - name: Build Angular (ci configuration)
        # Builds with environment.ci.ts so apiUrl='http://localhost:8080'
        # — no proxy needed; CORS is already open for localhost:4200.
        # outputHashing=none keeps filenames stable (main.js, polyfills.js).
        working-directory: hlm-frontend
        run: npx ng build --configuration=ci

      - name: Serve Angular static build (SPA)
        # Python3 SPA handler: serves index.html for any path that isn't a real
        # file so Angular's client-side router works correctly. Python3 is
        # always available on ubuntu-latest, sets correct MIME types, and does
        # NOT redirect to / (unlike some versions of the `serve` npm package).
        run: |
          cat > /tmp/spa_server.py << 'PYEOF'
          import http.server, os, socketserver, mimetypes

          os.chdir('hlm-frontend/dist/frontend/browser')

          class SPAHandler(http.server.SimpleHTTPRequestHandler):
              def do_GET(self):
                  p = self.path.split('?')[0]
                  if not os.path.exists('.' + p) or os.path.isdir('.' + p):
                      self.path = '/index.html'
                  return super().do_GET()
              def log_message(self, *a):
                  pass

          mimetypes.add_type('application/javascript', '.js')
          mimetypes.add_type('application/javascript', '.mjs')

          socketserver.TCPServer.allow_reuse_address = True
          with socketserver.TCPServer(('', 4200), SPAHandler) as srv:
              srv.serve_forever()
          PYEOF
          python3 /tmp/spa_server.py &

      - name: Wait for static server to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4200/ >/dev/null 2>&1; then
              echo "Server ready (iteration $i)"
              exit 0
            fi
            echo "[$i/30] waiting..."
            sleep 2
          done
          echo "Static server did not start in time"
          exit 1

      - name: Run E2E tests
        # PLAYWRIGHT_API_BASE: page.request uses playwright's baseURL (port 4200 /
        # Python SPA server) which only serves GET.  API write calls in tests must
        # go directly to the backend at port 8080.  Angular itself already uses
        # environment.ci.ts (apiUrl='http://localhost:8080') for its own HTTP calls.
        env:
          PLAYWRIGHT_API_BASE: http://localhost:8080
        run: cd hlm-frontend && npx playwright test

      - name: Dump backend logs on failure
        if: failure()
        run: docker compose logs hlm-backend --tail=100

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: hlm-frontend/playwright-report/
          retention-days: 7
