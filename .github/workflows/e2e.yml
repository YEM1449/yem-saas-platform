name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for CI
        run: |
          cat > .env << 'EOF'
          JWT_SECRET=ci-e2e-test-secret-not-for-production-x32c
          EOF

      - name: Start backend services
        run: docker compose up -d --wait --wait-timeout 180

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: hlm-frontend/package-lock.json

      - name: Install dependencies
        run: cd hlm-frontend && npm ci

      - name: Install Playwright browsers
        run: cd hlm-frontend && npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: cd hlm-frontend && npx playwright test

      - name: Dump backend logs on failure
        if: failure()
        run: docker compose logs hlm-backend --tail=100

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: hlm-frontend/playwright-report/
          retention-days: 7
