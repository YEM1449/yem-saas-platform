name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Force all JavaScript actions to use Node.js 24 (Node 20 deprecated June 2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for CI
        run: |
          cat > .env << 'EOF'
          JWT_SECRET=ci-e2e-test-secret-not-for-production-x32c
          CORS_ALLOWED_ORIGINS=http://localhost:4200,http://127.0.0.1:4200
          EOF

      - name: Start infrastructure (postgres, redis, minio)
        run: docker compose up -d postgres redis minio

      - name: Wait for infrastructure health
        run: |
          for i in $(seq 1 24); do
            PG=$(docker inspect --format='{{.State.Health.Status}}' hlm-postgres 2>/dev/null || echo "missing")
            RD=$(docker inspect --format='{{.State.Health.Status}}' hlm-redis 2>/dev/null || echo "missing")
            echo "[$i/24] postgres=$PG redis=$RD"
            [ "$PG" = "healthy" ] && [ "$RD" = "healthy" ] && echo "Infrastructure ready" && break
            sleep 5
          done

      - name: Start backend
        run: docker compose up -d hlm-backend

      - name: Wait for backend — dump logs on failure
        run: |
          echo "Waiting for backend health (max 5 min)..."
          for i in $(seq 1 30); do
            STATE=$(docker inspect --format='{{.State.Status}}' hlm-backend 2>/dev/null || echo "gone")
            HEALTH=$(docker inspect --format='{{.State.Health.Status}}' hlm-backend 2>/dev/null || echo "none")
            echo "[$i/30] state=$STATE health=$HEALTH"
            if [ "$HEALTH" = "healthy" ]; then
              echo "Backend is healthy"
              break
            fi
            if [ "$STATE" = "exited" ] || [ "$STATE" = "dead" ]; then
              echo "Backend crashed — logs:"
              docker logs hlm-backend 2>&1 | tail -100
              exit 1
            fi
            if [ "$i" -eq 30 ]; then
              echo "Backend timed out — logs:"
              docker logs hlm-backend 2>&1 | tail -100
              exit 1
            fi
            sleep 10
          done

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: hlm-frontend/package-lock.json

      - name: Install dependencies
        run: cd hlm-frontend && npm ci

      - name: Install Playwright browsers
        run: cd hlm-frontend && npx playwright install chromium --with-deps

      - name: Build Angular (ci configuration)
        # Builds with environment.ci.ts so apiUrl='http://localhost:8080'
        # — no proxy needed; CORS is already open for localhost:4200.
        # outputHashing=none keeps filenames stable (main.js, polyfills.js).
        working-directory: hlm-frontend
        run: npx ng build --configuration=ci

      - name: Serve Angular static build
        # 'serve' is a zero-config static file server with SPA support.
        # --single rewrites all 404 → index.html so Angular router works.
        working-directory: hlm-frontend
        run: npx --yes serve dist/frontend/browser --listen 4200 --single &

      - name: Wait for static server to be ready
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:4200/ >/dev/null 2>&1 && echo "Server ready (iteration $i)" && exit 0
            echo "[$i/20] waiting..."
            sleep 2
          done
          echo "Static server did not start in time"
          exit 1

      - name: Run E2E tests
        run: cd hlm-frontend && npx playwright test

      - name: Dump backend logs on failure
        if: failure()
        run: docker compose logs hlm-backend --tail=100

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: hlm-frontend/playwright-report/
          retention-days: 7
