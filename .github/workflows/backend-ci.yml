name: Backend CI

on:
  push:
    paths:
      - "hlm-backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "hlm-backend/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-and-package:
    name: Unit Tests + Package
    runs-on: ubuntu-latest
    timeout-minutes: 25

    defaults:
      run:
        working-directory: hlm-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Ensure Maven Wrapper is executable
        run: chmod +x mvnw

      - name: Run unit tests
        run: ./mvnw -B -ntp test

      - name: Build package
        run: ./mvnw -B -ntp -DskipTests package

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: hlm-backend/target/surefire-reports/**
          if-no-files-found: warn

  integration-test:
    name: Integration Tests (Failsafe)
    needs: unit-and-package
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: hlm-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Verify Docker (for Testcontainers)
        run: docker info

      - name: Ensure Maven Wrapper is executable
        run: chmod +x mvnw

      - name: Run integration tests
        run: ./mvnw -B -ntp failsafe:integration-test

      - name: Upload integration test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failsafe-reports
          path: hlm-backend/target/failsafe-reports/**
          if-no-files-found: warn
