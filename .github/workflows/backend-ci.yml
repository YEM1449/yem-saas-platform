name: Backend CI

on:
  push:
    paths:
      - "hlm-backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "hlm-backend/**"
      - ".github/workflows/backend-ci.yml"

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Verify Docker (for Testcontainers)
        run: docker info

      - name: Run tests (Maven Wrapper)
        working-directory: hlm-backend
        run: |
          chmod +x mvnw
          ./mvnw -B test

      - name: Upload test reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-failsafe-reports
          path: |
            hlm-backend/target/surefire-reports/**
            hlm-backend/target/failsafe-reports/**
