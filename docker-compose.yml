# ── YEM SaaS Platform — Docker Compose ───────────────────────────────────────
#
# Base file. Intended to be layered with:
#   docker-compose.override.yml  — local development extras (hot-reload, debug)
#   docker-compose.prod.yml      — production hardening (resource limits, secrets)
#
# Usage (local dev):
#   docker compose up -d
#
# Usage (production):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Required env vars: copy .env.example → .env and fill in secrets.

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hlm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-hlm}
      POSTGRES_USER:     ${POSTGRES_USER:-hlm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hlm_pwd}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hlm_user} -d ${POSTGRES_DB:-hlm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hlm-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── MinIO (S3-compatible object storage) ────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: hlm-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Backend ─────────────────────────────────────────────────────────────────
  hlm-backend:
    build:
      context: ./hlm-backend
      dockerfile: Dockerfile
    image: hlm-backend:${IMAGE_TAG:-latest}
    container_name: hlm-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database
      DB_URL:      jdbc:postgresql://postgres:5432/${POSTGRES_DB:-hlm}
      DB_USER:     ${POSTGRES_USER:-hlm_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-hlm_pwd}
      # JWT
      JWT_SECRET:      ${JWT_SECRET}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS:-3600}
      # Redis
      REDIS_HOST:     redis
      REDIS_PORT:     6379
      REDIS_ENABLED:  ${REDIS_ENABLED:-true}
      # Object Storage (S3-compatible protocol — MinIO in this stack, swap endpoint for OVH/Scaleway/etc.)
      MEDIA_OBJECT_STORAGE_ENABLED:    ${MEDIA_OBJECT_STORAGE_ENABLED:-false}
      MEDIA_OBJECT_STORAGE_ENDPOINT:   http://minio:9000
      MEDIA_OBJECT_STORAGE_BUCKET:     ${MEDIA_OBJECT_STORAGE_BUCKET:-hlm-media}
      MEDIA_OBJECT_STORAGE_REGION:     ${MEDIA_OBJECT_STORAGE_REGION:-us-east-1}
      MEDIA_OBJECT_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MEDIA_OBJECT_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      # Email / SMS
      EMAIL_HOST:     ${EMAIL_HOST:-}
      EMAIL_PORT:     ${EMAIL_PORT:-587}
      EMAIL_USER:     ${EMAIL_USER:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      EMAIL_FROM:     ${EMAIL_FROM:-noreply@hlm.local}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN:  ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM:        ${TWILIO_FROM:-}
      # Portal
      PORTAL_BASE_URL:    ${PORTAL_BASE_URL:-http://localhost}
      # GDPR
      GDPR_RETENTION_DAYS:  ${GDPR_RETENTION_DAYS:-1825}
      DATA_RETENTION_CRON:  ${DATA_RETENTION_CRON:-0 0 2 * * *}
      # CORS
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      # Scheduler
      spring.task.scheduling.enabled: "true"
      # OpenTelemetry
      OTEL_SERVICE_NAME:     hlm-backend
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_ENDPOINT:-http://otel-collector:4317}
      OTEL_METRICS_EXPORTER: ${OTEL_METRICS_EXPORTER:-none}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Frontend ─────────────────────────────────────────────────────────────────
  hlm-frontend:
    build:
      context: ./hlm-frontend
      dockerfile: Dockerfile
    image: hlm-frontend:${IMAGE_TAG:-latest}
    container_name: hlm-frontend
    restart: unless-stopped
    depends_on:
      hlm-backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  default:
    name: hlm-network
