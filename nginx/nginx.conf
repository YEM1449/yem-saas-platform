# nginx/nginx.conf — Production TLS termination for HLM SaaS Platform
#
# SETUP:
#   1. Replace "app.example.com" throughout this file with your real domain.
#   2. Obtain a Let's Encrypt certificate:
#        certbot certonly --standalone -d app.example.com --agree-tos -m admin@example.com
#   3. Copy or symlink this file to /etc/nginx/nginx.conf (or include it).
#   4. Test: nginx -t
#   5. Reload: nginx -s reload
#
# ARCHITECTURE:
#   Internet → Nginx :443 (TLS terminated) → Angular SPA (static)
#                                           → Spring Boot :8080 (plain HTTP, local only)
#
# SECURITY:
#   - TLS 1.2 + 1.3 only; TLS 1.0 / 1.1 disabled.
#   - HSTS with 1-year max-age, includeSubDomains, preload.
#   - X-Frame-Options DENY, X-Content-Type-Options nosniff.
#   - CSP: default-src 'self'.
#   - Nginx listens on 443 only; port 80 redirects to 443.
#   - Port 8080 (Spring Boot) must be bound to 127.0.0.1, not 0.0.0.0.

events {
    worker_connections 1024;
}

http {

    # ── MIME types ───────────────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log;

    # ── Security headers (applied to all server blocks) ──────────────────────
    # HSTS: force HTTPS for 1 year, include all subdomains, eligible for preload list.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    # Prevent clickjacking by denying iframe embedding.
    add_header X-Frame-Options            "DENY"                                         always;
    # Prevent MIME-type sniffing.
    add_header X-Content-Type-Options     "nosniff"                                      always;
    # Enable XSS filtering in older browsers.
    add_header X-XSS-Protection           "1; mode=block"                                always;
    # Control referrer information sent to other origins.
    add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
    # Disable potentially dangerous browser features.
    add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()"      always;
    # Content Security Policy: restrict resource origins.
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'"
        always;

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name app.example.com;
        # Permanent redirect — clients cache this, so future requests go directly to HTTPS.
        return 301 https://$host$request_uri;
    }

    # ── HTTPS: Angular SPA + Spring Boot API proxy ────────────────────────────
    server {
        listen 443 ssl http2;
        server_name app.example.com;

        # ── TLS certificates (Let's Encrypt) ─────────────────────────────────
        # Replace <DOMAIN> with your actual domain in the paths below.
        ssl_certificate     /etc/letsencrypt/live/app.example.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/app.example.com/privkey.pem;

        # ── TLS protocol and cipher policy ───────────────────────────────────
        # Only TLS 1.2 and 1.3. TLS 1.0 and 1.1 are deprecated and insecure.
        ssl_protocols TLSv1.2 TLSv1.3;
        # Modern cipher suites: prefer ECDHE + AES-GCM + ChaCha20. No RC4, no 3DES.
        ssl_ciphers   HIGH:!aNULL:!MD5:!RC4:!3DES;
        ssl_prefer_server_ciphers on;

        # ── TLS session cache (improves performance for repeat connections) ───
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Angular SPA static files ──────────────────────────────────────────
        # After npm run build, copy dist/hlm-frontend/browser/ to /var/www/hlm-frontend/
        root  /var/www/hlm-frontend;
        index index.html;

        location / {
            # Angular router: serve index.html for all paths not matching a file.
            try_files $uri $uri/ /index.html;
        }

        # ── Spring Boot API reverse proxy ─────────────────────────────────────
        # Proxies /auth, /api, /dashboard, /actuator to the local Spring Boot server.
        # Spring Boot must be configured with FORWARD_HEADERS_STRATEGY=FRAMEWORK
        # so it trusts the X-Forwarded-Proto header set here.
        location ~ ^/(auth|api|dashboard|actuator)/ {
            proxy_pass         http://127.0.0.1:8080;
            proxy_http_version 1.1;

            # Forward original host for virtual-host routing.
            proxy_set_header Host              $host;
            # Forward real client IP for rate limiting and audit logging.
            proxy_set_header X-Real-IP         $remote_addr;
            # Append to existing forwarded-for chain.
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            # Tell Spring Boot the original scheme so it generates correct redirect URLs.
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeout settings — increase for long-running PDF generation requests.
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;

            # Do not buffer large responses (e.g. PDF downloads).
            proxy_buffering off;
        }
    }
}
