requirements:
  - id: REQ-001
    module_id: MOD-01
    title: JWT authentication for CRM users
    description: Users authenticate via login endpoint and receive JWT containing user and tenant scope.
    acceptance_criteria:
      - Login endpoint validates credentials and returns token on success.
      - Invalid credentials return stable error response.
      - Token contains subject and tenant claim required by backend authorization flow.
    priority: P0
    spec_source: CRM-HLM_Functional_Spec.md §6 (FR-001)
    naming_terms: [auth, jwt, user, tenant]

  - id: REQ-002
    module_id: MOD-01
    title: Role-based authorization enforcement
    description: Backend endpoints enforce role constraints for admin/manager/agent operations.
    acceptance_criteria:
      - Admin-only routes are protected by role checks.
      - Manager/admin shared actions require explicit method-level authorization.
      - Unauthorized access returns 403/401 consistently.
    priority: P0
    spec_source: CRM-HLM_Functional_Spec.md §3/§6
    naming_terms: [RBAC, ROLE_ADMIN, ROLE_MANAGER, ROLE_AGENT]

  - id: REQ-003
    module_id: MOD-02
    title: Tenant-scoped data isolation
    description: Every business operation must stay isolated by tenant context derived from JWT.
    acceptance_criteria:
      - Request processing extracts tenant id and user id from JWT.
      - Repository access uses tenant-scoped predicates.
      - Cross-tenant access attempts are rejected and covered by tests.
    priority: P0
    spec_source: CRM-HLM_Functional_Spec.md §2.1 FR-002
    naming_terms: [tenant, isolation, tid]

  - id: REQ-004
    module_id: MOD-02
    title: Tenant bootstrap API
    description: Platform provides tenant creation/bootstrap for onboarding.
    acceptance_criteria:
      - API allows tenant creation with key metadata.
      - Created tenant can be fetched by id.
      - Duplicate key/name handling is validated.
    priority: P1
    spec_source: CRM-HLM_Technical_Spec.md §5
    naming_terms: [tenant, onboarding]

  - id: REQ-005
    module_id: MOD-03
    title: Land prospection record management
    description: Maintain terrain/land pipeline and qualification data.
    acceptance_criteria:
      - CRUD endpoints exist for terrain records.
      - Pipeline stages are explicit and auditable.
      - COS/CES computations are persisted and displayed.
    priority: P1
    spec_source: CRM-HLM_Functional_Spec.md FR-008
    naming_terms: [terrain, foncier, COS, CES]

  - id: REQ-006
    module_id: MOD-04
    title: Contact and prospect lifecycle management
    description: Manage contacts/prospects and transitions to clients.
    acceptance_criteria:
      - Contact CRUD/list with status filtering is available.
      - Status transition rules are validated server-side.
      - Conversion to client is supported.
    priority: P0
    spec_source: CRM-HLM_Functional_Spec.md FR-003/FR-005
    naming_terms: [contact, prospect, client, status]

  - id: REQ-007
    module_id: MOD-04
    title: Property catalog and availability management
    description: Maintain sellable properties and statuses.
    acceptance_criteria:
      - Property CRUD endpoints exist.
      - Property status enum includes availability lifecycle states.
      - Property list supports search/filter and pagination.
    priority: P0
    spec_source: CRM-HLM_Functional_Spec.md FR-004
    naming_terms: [property, lot, status]

  - id: REQ-008
    module_id: MOD-04
    title: Deposit/reservation workflow
    description: Create, confirm, cancel, and expire deposits with property lock/release semantics.
    acceptance_criteria:
      - Creating deposit reserves active property.
      - Confirm action allowed only from pending status.
      - Cancel/expire actions release property when applicable.
    priority: P0
    spec_source: CRM-HLM_Functional_Spec.md FR-006
    naming_terms: [deposit, reservation, pending, confirmed]

  - id: REQ-009
    module_id: MOD-05
    title: Administrative authorization workflow
    description: Track administrative/regulatory dossiers and deadlines.
    acceptance_criteria:
      - Authorization dossier entities and API exist.
      - Workflow statuses and due-date alerts are managed.
      - Document attachment/archival is available.
    priority: P1
    spec_source: CRM-HLM_Functional_Spec.md FR-009
    naming_terms: [autorisation, administratif, dossier]

  - id: REQ-010
    module_id: MOD-06
    title: Construction planning and site journal
    description: Plan and track chantier tasks, incidents, and progress evidence.
    acceptance_criteria:
      - Gantt/planning structure exists in backend and UI.
      - Site journal supports incident/photo entries.
      - Progress KPIs are reportable.
    priority: P2
    spec_source: CRM-HLM_Functional_Spec.md FR-010
    naming_terms: [chantier, planning, journal]

  - id: REQ-011
    module_id: MOD-07
    title: Stock movement and inventory
    description: Manage chantier stock entries/exits and inventory controls.
    acceptance_criteria:
      - Stock movement entity/API exists.
      - Inventory count and low-stock alerts exist.
      - QR/NFC scanning integration is supported.
    priority: P2
    spec_source: CRM-HLM_Functional_Spec.md FR-011
    naming_terms: [stock, inventory, QR]

  - id: REQ-012
    module_id: MOD-08
    title: Procurement workflow DA-BC-Facture
    description: Execute procurement workflow from purchase request to supplier invoice reconciliation.
    acceptance_criteria:
      - Purchase request and approval states are represented.
      - Purchase order and reception are linked.
      - Invoice reconciliation status is tracked prior to payment.
    priority: P2
    spec_source: CRM-HLM_Functional_Spec.md FR-012
    naming_terms: [achat, fournisseur, DA, BC, facture]

  - id: REQ-013
    module_id: MOD-09
    title: Financial control and margin reporting
    description: Track projected vs actual costs and project margins.
    acceptance_criteria:
      - Financial records exist with tenant/project scoping.
      - Margin and variance KPIs are computed.
      - Accounting export is available.
    priority: P2
    spec_source: CRM-HLM_Functional_Spec.md FR-014
    naming_terms: [finance, marge, export]

  - id: REQ-014
    module_id: MOD-10
    title: SAV ticket lifecycle
    description: Create, assign, process, and close after-sales service tickets.
    acceptance_criteria:
      - SAV ticket entities and endpoints exist.
      - Assignment and intervention workflow is modeled.
      - Closure/validation state is persisted.
    priority: P2
    spec_source: CRM-HLM_Functional_Spec.md FR-017
    naming_terms: [SAV, ticket, intervention]

  - id: REQ-015
    module_id: MOD-11
    title: Executive dashboard metrics
    description: Provide summary KPIs for properties, sales, and operational states.
    acceptance_criteria:
      - Dashboard API returns aggregated metrics.
      - Filters by period and scope are available.
      - Frontend renders dashboard widgets.
    priority: P1
    spec_source: CRM-HLM_Functional_Spec.md FR-007
    naming_terms: [dashboard, KPI, summary]

  - id: REQ-016
    module_id: MOD-12
    title: Notification center and reminders
    description: Deliver in-app notifications and workflow reminders.
    acceptance_criteria:
      - Notification entity/API supports read/unread states.
      - Business workflows trigger notifications.
      - Reminder automation policy is configurable.
    priority: P1
    spec_source: CRM-HLM_Functional_Spec.md FR-013
    naming_terms: [notification, reminder]

  - id: REQ-017
    module_id: MOD-13
    title: Public integration API baseline
    description: Expose stable APIs for external integration and automation.
    acceptance_criteria:
      - Authenticated API endpoints are documented and versioned.
      - Integration-specific contracts are defined.
      - Error and rate-limit policies are specified.
    priority: P2
    spec_source: CRM-HLM_Functional_Spec.md FR-018
    naming_terms: [API, integration, webhook]

  - id: REQ-018
    module_id: MOD-02
    title: Cross-cutting multi-society consolidation views
    description: Direction users can access consolidated cross-society indicators without breaching tenant isolation.
    acceptance_criteria:
      - Data model clearly defines consolidation boundary.
      - Access is restricted to privileged roles.
      - Consolidated dashboards are available in UI.
    priority: P1
    spec_source: CRM-HLM_Phase1_Document_Intelligence.md §4
    naming_terms: [multi-societies, consolidation]

  - id: REQ-019
    module_id: MOD-05
    title: Cross-cutting document management
    description: Document attachment, generated contract storage, and archival policy across modules.
    acceptance_criteria:
      - Documents are linked to business aggregates.
      - Access checks enforce tenant/role boundaries.
      - Retention/export policy is documented.
    priority: P1
    spec_source: CRM-HLM_Phase1_Document_Intelligence.md §5
    naming_terms: [document, archival, compliance]

  - id: REQ-020
    module_id: MOD-01
    title: Security baseline with auditability
    description: Security controls include authN/authZ, token revocation, error contract stability, and auditable operations.
    acceptance_criteria:
      - Token revocation or invalidation strategy exists.
      - Error responses are standardized.
      - Sensitive operations are logged/auditable.
    priority: P0
    spec_source: CRM-HLM_Technical_Spec.md §6
    naming_terms: [security, audit, error contract]
