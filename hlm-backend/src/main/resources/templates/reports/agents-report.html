<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8"/>
  <title>Rapport de performance &#8212; Agents</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, Helvetica, sans-serif; font-size: 10pt; color: #222; padding: 18mm 16mm; }

    .doc-header { border-bottom: 3px solid #1a4480; padding-bottom: 10px; margin-bottom: 20px; }
    .doc-header table { width: 100%; border-collapse: collapse; }
    .company-name { font-size: 14pt; font-weight: bold; color: #1a4480; }
    .doc-title { font-size: 16pt; font-weight: bold; color: #1a4480; text-align: right; }
    .doc-subtitle { font-size: 9pt; color: #555; text-align: right; margin-top: 3px; }

    .summary-row { display: table; width: 100%; border-collapse: collapse; margin-bottom: 18px; }
    .summary-cell { display: table-cell; width: 50%; background: #f0f4fc; border: 1px solid #d0daf0;
                    padding: 10px 14px; vertical-align: top; }
    .summary-label { font-size: 8pt; color: #555; text-transform: uppercase; letter-spacing: 0.4px; }
    .summary-value { font-size: 13pt; font-weight: bold; color: #1a4480; margin-top: 3px; }

    table.data-table { width: 100%; border-collapse: collapse; font-size: 9pt; }
    table.data-table thead th { background: #1a4480; color: #fff; padding: 7px 8px;
                                 text-align: left; font-weight: bold; font-size: 8.5pt; }
    table.data-table thead th.right { text-align: right; }
    table.data-table tbody tr:nth-child(even) td { background: #f7f9ff; }
    table.data-table tbody td { padding: 6px 8px; border-bottom: 1px solid #e0e6f0; vertical-align: middle; }
    .rank { font-weight: bold; color: #1a4480; text-align: center; }
    .amount { text-align: right; font-weight: bold; color: #1a4480; }
    .count { text-align: right; }
    .total-row td { background: #edf2fb; font-weight: bold; border-top: 2px solid #1a4480; }
    .footer { margin-top: 20px; border-top: 1px solid #ccc; padding-top: 8px;
               font-size: 8pt; color: #888; text-align: center; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="doc-header">
    <table>
      <tr>
        <td><div class="company-name" th:text="${societeNom}">Société</div></td>
        <td>
          <div class="doc-title">PERFORMANCE AGENTS</div>
          <div class="doc-subtitle" th:if="${from != null or to != null}">
            Période :
            <span th:if="${from != null}" th:text="${#temporals.format(from, 'dd/MM/yyyy')}"></span>
            <span th:if="${from != null and to != null}">&#8212;</span>
            <span th:if="${to != null}" th:text="${#temporals.format(to, 'dd/MM/yyyy')}"></span>
          </div>
          <div class="doc-subtitle" th:if="${from == null and to == null}">Toutes périodes</div>
          <div class="doc-subtitle">
            Généré le <span th:text="${#temporals.format(generatedAt, 'dd/MM/yyyy à HH:mm')}"></span>
          </div>
        </td>
      </tr>
    </table>
  </div>

  <!-- Summary -->
  <div class="summary-row">
    <div class="summary-cell">
      <div class="summary-label">Nombre d'agents</div>
      <div class="summary-value" th:text="${#lists.size(agents)}">0</div>
    </div>
    <div class="summary-cell">
      <div class="summary-label">CA total (MAD)</div>
      <div class="summary-value" th:text="${#numbers.formatDecimal(totalCA, 0, 'COMMA', 0, 'POINT')}">0</div>
    </div>
  </div>

  <!-- Data table -->
  <table class="data-table">
    <thead>
      <tr>
        <th style="width:40px">#</th>
        <th>Agent</th>
        <th class="right">CA (MAD)</th>
        <th class="right">Ventes</th>
        <th class="right">CA moyen/vente (MAD)</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="a,iter : ${agents}">
        <td class="rank" th:text="${iter.index + 1}"></td>
        <td th:text="${a['agentName']}"></td>
        <td class="amount" th:text="${#numbers.formatDecimal(a['totalCA'], 0, 'COMMA', 0, 'POINT')}"></td>
        <td class="count" th:text="${a['ventesCount']}"></td>
        <td class="amount"
            th:text="${a['ventesCount'] != null and a['ventesCount'] > 0
                       ? #numbers.formatDecimal(a['totalCA'] / a['ventesCount'], 0, 'COMMA', 0, 'POINT')
                       : '&#8212;'}"></td>
      </tr>
      <tr class="total-row" th:if="${#lists.size(agents) > 0}">
        <td></td>
        <td>Total</td>
        <td class="amount" th:text="${#numbers.formatDecimal(totalCA, 0, 'COMMA', 0, 'POINT')}"></td>
        <td class="count" th:text="${totalVentes}"></td>
        <td></td>
      </tr>
    </tbody>
  </table>

  <div th:if="${#lists.isEmpty(agents)}" style="text-align:center;padding:30px;color:#888;">
    Aucune donnée agent pour la période sélectionnée.
  </div>

  <div class="footer">
    Généré le <span th:text="${#temporals.format(generatedAt, 'dd/MM/yyyy à HH:mm')}"></span>
    &#160;&#8212;&#160; Confidentiel, usage interne
  </div>

</body>
</html>
