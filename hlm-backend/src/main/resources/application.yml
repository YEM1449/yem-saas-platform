spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hlm}
    username: ${DB_USER:hlm_user}
    password: ${DB_PASSWORD:hlm_pwd}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      validation-timeout: 5000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: public
  mail:
    host: ${EMAIL_HOST:}
    port: ${EMAIL_PORT:587}
    username: ${EMAIL_USER:}
    password: ${EMAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: ${SERVER_PORT:8080}
  # Trust forwarded headers only when behind a known reverse proxy.
  # NONE = don't process forwarded headers (default, safe for direct exposure).
  # FRAMEWORK = trust X-Forwarded-Proto from Nginx/LB (set in production).
  # NATIVE = use Tomcat RemoteIpValve (legacy default).
  forward-headers-strategy: ${FORWARD_HEADERS_STRATEGY:NONE}

  # TLS — enabled when SSL_ENABLED=true
  ssl:
    enabled: ${SSL_ENABLED:false}
    key-store: ${SSL_KEYSTORE_PATH:classpath:ssl/hlm-dev.p12}
    key-store-type: PKCS12
    key-store-password: ${SSL_KEYSTORE_PASSWORD:changeit}
    key-alias: ${SSL_KEY_ALIAS:hlm-dev}
    protocol: TLS
    enabled-protocols: TLSv1.2,TLSv1.3
    ciphers: >
      TLS_AES_256_GCM_SHA384,
      TLS_AES_128_GCM_SHA256,
      TLS_CHACHA20_POLY1305_SHA256,
      TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384,
      TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256

management:
  endpoints:
    web:
      exposure:
        include: health,info

security:
  jwt:
    secret: ${JWT_SECRET}
    ttl-seconds: ${JWT_TTL_SECONDS:3600}

app:
  rate-limit:
    login:
      capacity: ${RATE_LIMIT_LOGIN_CAPACITY:5}
      refill-period: ${RATE_LIMIT_LOGIN_REFILL_PERIOD:15m}
      exceeded-message: ${RATE_LIMIT_LOGIN_MESSAGE:Too many login attempts. Please try again in 15 minutes.}
    portal-link:
      capacity: ${RATE_LIMIT_PORTAL_CAPACITY:3}
      refill-period: ${RATE_LIMIT_PORTAL_REFILL_PERIOD:1h}
      exceeded-message: ${RATE_LIMIT_PORTAL_MESSAGE:Too many magic link requests. Please try again in 1 hour.}

  outbox:
    # Number of PENDING messages claimed per scheduler tick (SKIP LOCKED batch).
    batch-size: ${OUTBOX_BATCH_SIZE:20}
    # Maximum send attempts before a message is permanently marked FAILED.
    max-retries: ${OUTBOX_MAX_RETRIES:3}
    # Delay between scheduler ticks in milliseconds.
    polling-interval-ms: ${OUTBOX_POLL_INTERVAL_MS:5000}

  # SMTP email provider (optional — NoopEmailSender used when EMAIL_HOST is not set)
  email:
    host: ${EMAIL_HOST:}
    port: ${EMAIL_PORT:587}
    username: ${EMAIL_USER:}
    password: ${EMAIL_PASSWORD:}
    from: ${EMAIL_FROM:noreply@example.com}

  # SMS provider (Twilio — optional; NoopSmsSender used when TWILIO_ACCOUNT_SID is not set)
  sms:
    account-sid:  ${TWILIO_ACCOUNT_SID:}
    auth-token:   ${TWILIO_AUTH_TOKEN:}
    from-number:  ${TWILIO_FROM:}

  # Portal client-facing configuration
  portal:
    base-url: ${PORTAL_BASE_URL:http://localhost:4200}
    cleanup-cron: ${PORTAL_CLEANUP_CRON:0 0 3 * * *}

  payments:
    # Daily cron for marking overdue payment calls (default 06:00)
    overdue-cron: ${PAYMENTS_OVERDUE_CRON:0 0 6 * * *}

  reminder:
    # Whether the reminder scheduler is active
    enabled: ${REMINDER_ENABLED:true}
    # Cron expression for daily reminder run (default 08:00)
    cron: ${REMINDER_CRON:0 0 8 * * *}
    # Days before deposit due-date to send warnings (comma-separated)
    deposit-warn-days: ${REMINDER_DEPOSIT_WARN_DAYS:7,3,1}
    # Days of inactivity before a prospect is considered stale
    prospect-stale-days: ${REMINDER_PROSPECT_STALE_DAYS:14}

  media:
    # Local file storage directory for property media uploads
    storage-dir: ${MEDIA_STORAGE_DIR:./uploads}
    # Maximum allowed upload size in bytes (default 10 MB)
    max-file-size: ${MEDIA_MAX_FILE_SIZE:10485760}
    # Comma-separated list of allowed MIME types
    allowed-types: ${MEDIA_ALLOWED_TYPES:image/jpeg,image/png,image/webp,application/pdf}

  # CORS: comma-separated list of allowed origins (empty = deny all, suitable for prod lock-down)
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}

  security:
    rate-limit:
      login:
        ip-max: ${RATE_LIMIT_LOGIN_IP_MAX:20}
        key-max: ${RATE_LIMIT_LOGIN_KEY_MAX:10}
        window-seconds: ${RATE_LIMIT_LOGIN_WINDOW_SECONDS:60}
    lockout:
      max-attempts: ${LOCKOUT_MAX_ATTEMPTS:5}
      duration-minutes: ${LOCKOUT_DURATION_MINUTES:15}
