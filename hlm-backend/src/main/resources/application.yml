spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hlm}
    username: ${DB_USER:hlm_user}
    password: ${DB_PASSWORD:hlm_pwd}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      validation-timeout: 5000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: public
  mail:
    host: ${EMAIL_HOST:}
    port: ${EMAIL_PORT:587}
    username: ${EMAIL_USER:}
    password: ${EMAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

security:
  jwt:
    secret: ${JWT_SECRET}
    ttl-seconds: ${JWT_TTL_SECONDS:3600}

app:
  outbox:
    # Number of PENDING messages claimed per scheduler tick (SKIP LOCKED batch).
    batch-size: ${OUTBOX_BATCH_SIZE:20}
    # Maximum send attempts before a message is permanently marked FAILED.
    max-retries: ${OUTBOX_MAX_RETRIES:3}
    # Delay between scheduler ticks in milliseconds.
    polling-interval-ms: ${OUTBOX_POLL_INTERVAL_MS:5000}

  # SMTP email provider (optional — NoopEmailSender used when EMAIL_HOST is not set)
  email:
    host: ${EMAIL_HOST:}
    port: ${EMAIL_PORT:587}
    username: ${EMAIL_USER:}
    password: ${EMAIL_PASSWORD:}
    from: ${EMAIL_FROM:noreply@example.com}

  payments:
    # Daily cron for marking overdue payment calls (default 06:00)
    overdue-cron: ${PAYMENTS_OVERDUE_CRON:0 0 6 * * *}

  reminder:
    # Whether the reminder scheduler is active
    enabled: ${REMINDER_ENABLED:true}
    # Cron expression for daily reminder run (default 08:00)
    cron: ${REMINDER_CRON:0 0 8 * * *}
    # Days before deposit due-date to send warnings (comma-separated)
    deposit-warn-days: ${REMINDER_DEPOSIT_WARN_DAYS:7,3,1}
    # Days of inactivity before a prospect is considered stale
    prospect-stale-days: ${REMINDER_PROSPECT_STALE_DAYS:14}

  media:
    # Local file storage directory for property media uploads
    storage-dir: ${MEDIA_STORAGE_DIR:./uploads}
    # Maximum allowed upload size in bytes (default 10 MB)
    max-file-size: ${MEDIA_MAX_FILE_SIZE:10485760}
    # Comma-separated list of allowed MIME types
    allowed-types: ${MEDIA_ALLOWED_TYPES:image/jpeg,image/png,image/webp,application/pdf}

  # CORS: comma-separated list of allowed origins (empty = deny all, suitable for prod lock-down)
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
