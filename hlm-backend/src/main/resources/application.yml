spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hlm}
    username: ${DB_USER:hlm_user}
    password: ${DB_PASSWORD:hlm_pwd}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      validation-timeout: 5000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: public
  mail:
    host: ${EMAIL_HOST:}
    port: ${EMAIL_PORT:587}
    username: ${EMAIL_USER:}
    password: ${EMAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  # Redis connection (used when app.redis.enabled=true)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

server:
  port: ${SERVER_PORT:8080}
  # Trust forwarded headers only when behind a known reverse proxy.
  # NONE = don't process forwarded headers (default, safe for direct exposure).
  # FRAMEWORK = trust X-Forwarded-Proto from Nginx/LB (set in production).
  # NATIVE = use Tomcat RemoteIpValve (legacy default).
  forward-headers-strategy: ${FORWARD_HEADERS_STRATEGY:NONE}

  # TLS — enabled when SSL_ENABLED=true
  ssl:
    enabled: ${SSL_ENABLED:false}
    key-store: ${SSL_KEYSTORE_PATH:classpath:ssl/hlm-dev.p12}
    key-store-type: PKCS12
    key-store-password: ${SSL_KEYSTORE_PASSWORD:changeit}
    key-alias: ${SSL_KEY_ALIAS:hlm-dev}
    protocol: TLS
    enabled-protocols: TLSv1.2,TLSv1.3
    ciphers: >
      TLS_AES_256_GCM_SHA384,
      TLS_AES_128_GCM_SHA256,
      TLS_CHACHA20_POLY1305_SHA256,
      TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384,
      TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256

management:
  endpoints:
    web:
      exposure:
        # health + info always on; metrics + prometheus for Prometheus/Grafana scraping;
        # loggers for dynamic log-level changes without restart.
        include: health,info,metrics,prometheus,loggers
  health:
    mail:
      enabled: ${MAIL_HEALTH_ENABLED:false}
    defaults:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: ${PROMETHEUS_ENABLED:true}
    tags:
      # Standard service labels on every metric for Grafana dashboards
      application: hlm-backend
      environment: ${APP_ENV:local}
  tracing:
    enabled: ${OTEL_ENABLED:false}
    sampling:
      probability: ${OTEL_SAMPLE_RATE:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
    metrics:
      # Grafana Mimir / Tempo OTLP metrics endpoint (set OTEL_ENABLED=true to activate)
      endpoint: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:http://localhost:4318/v1/metrics}

security:
  jwt:
    secret: ${JWT_SECRET}
    ttl-seconds: ${JWT_TTL_SECONDS:3600}

app:
  # Bootstrap — set APP_BOOTSTRAP_ENABLED=true ONLY on first deploy, then remove
  bootstrap:
    enabled: ${APP_BOOTSTRAP_ENABLED:false}
    superadmin:
      email:    ${APP_BOOTSTRAP_EMAIL:}
      password: ${APP_BOOTSTRAP_PASSWORD:}

  rate-limit:
    login:
      capacity: ${RATE_LIMIT_LOGIN_CAPACITY:5}
      refill-period: ${RATE_LIMIT_LOGIN_REFILL_PERIOD:15m}
      exceeded-message: ${RATE_LIMIT_LOGIN_MESSAGE:Too many login attempts. Please try again in 15 minutes.}
    portal-link:
      capacity: ${RATE_LIMIT_PORTAL_CAPACITY:3}
      refill-period: ${RATE_LIMIT_PORTAL_REFILL_PERIOD:1h}
      exceeded-message: ${RATE_LIMIT_PORTAL_MESSAGE:Too many magic link requests. Please try again in 1 hour.}
    invitation:
      capacity: ${RATE_LIMIT_INVITATION_CAPACITY:10}
      refill-period: ${RATE_LIMIT_INVITATION_REFILL_PERIOD:1h}
      exceeded-message: ${RATE_LIMIT_INVITATION_MESSAGE:Too many invitation requests. Please try again in 1 hour.}

  outbox:
    # Number of PENDING messages claimed per scheduler tick (SKIP LOCKED batch).
    batch-size: ${OUTBOX_BATCH_SIZE:20}
    # Maximum send attempts before a message is permanently marked FAILED.
    max-retries: ${OUTBOX_MAX_RETRIES:3}
    # Delay between scheduler ticks in milliseconds.
    polling-interval-ms: ${OUTBOX_POLL_INTERVAL_MS:5000}

  # SMTP email provider (optional — NoopEmailSender used when EMAIL_HOST is not set)
  email:
    host: ${EMAIL_HOST:}
    port: ${EMAIL_PORT:587}
    username: ${EMAIL_USER:}
    password: ${EMAIL_PASSWORD:}
    from: ${EMAIL_FROM:noreply@example.com}

  # SMS provider (Twilio — optional; NoopSmsSender used when TWILIO_ACCOUNT_SID is not set)
  sms:
    account-sid:  ${TWILIO_ACCOUNT_SID:}
    auth-token:   ${TWILIO_AUTH_TOKEN:}
    from-number:  ${TWILIO_FROM:}

  # Frontend base URL — used for invitation links in emails
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:4200}

  # Portal client-facing configuration
  portal:
    base-url: ${PORTAL_BASE_URL:http://localhost:4200}
    cleanup-cron: "${PORTAL_CLEANUP_CRON:0 0 3 * * *}"

  payments:
    # Daily cron for marking overdue payment calls (default 06:00)
    overdue-cron: "${PAYMENTS_OVERDUE_CRON:0 0 6 * * *}"

  reminder:
    # Whether the reminder scheduler is active
    enabled: ${REMINDER_ENABLED:true}
    # Cron expression for daily reminder run (default 08:00)
    cron: "${REMINDER_CRON:0 0 8 * * *}"
    # Days before deposit due-date to send warnings (comma-separated)
    deposit-warn-days: ${REMINDER_DEPOSIT_WARN_DAYS:7,3,1}
    # Days of inactivity before a prospect is considered stale
    prospect-stale-days: ${REMINDER_PROSPECT_STALE_DAYS:14}

  # Redis distributed cache — set true in production; Caffeine used otherwise
  redis:
    enabled: ${REDIS_ENABLED:false}

  media:
    # Local file storage directory for property media uploads
    storage-dir: ${MEDIA_STORAGE_DIR:./uploads}
    # Maximum allowed upload size in bytes (default 10 MB)
    max-file-size: ${MEDIA_MAX_FILE_SIZE:10485760}
    # Comma-separated list of allowed MIME types
    allowed-types: ${MEDIA_ALLOWED_TYPES:image/jpeg,image/png,image/webp,application/pdf}
    # S3-compatible object storage — activated when enabled=true
    # Works with OVH, Scaleway, Hetzner, Cloudflare R2, MinIO, and AWS S3.
    # Leave endpoint blank for AWS S3 (SDK auto-resolves). Set for all other providers.
    object-storage:
      enabled:    ${MEDIA_OBJECT_STORAGE_ENABLED:false}
      endpoint:   ${MEDIA_OBJECT_STORAGE_ENDPOINT:}
      region:     ${MEDIA_OBJECT_STORAGE_REGION:eu-west-1}
      bucket:     ${MEDIA_OBJECT_STORAGE_BUCKET:hlm-media}
      access-key: ${MEDIA_OBJECT_STORAGE_ACCESS_KEY:}
      secret-key: ${MEDIA_OBJECT_STORAGE_SECRET_KEY:}

  # GDPR / Law 09-08 data retention
  gdpr:
    # Default contact data retention in days (5 years = 1825 days)
    default-retention-days: ${GDPR_RETENTION_DAYS:1825}
    # Cron for daily retention sweep (default 02:00)
    retention-cron: "${DATA_RETENTION_CRON:0 0 2 * * *}"

  # CORS: comma-separated list of allowed origins.
  # Default covers local dev (Angular on :4200, both localhost and 127.0.0.1).
  # In production set CORS_ALLOWED_ORIGINS to your exact frontend domain, e.g.
  #   CORS_ALLOWED_ORIGINS=https://app.yourcompany.com
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}

  security:
    rate-limit:
      login:
        ip-max: ${RATE_LIMIT_LOGIN_IP_MAX:20}
        key-max: ${RATE_LIMIT_LOGIN_KEY_MAX:10}
        window-seconds: ${RATE_LIMIT_LOGIN_WINDOW_SECONDS:60}
    lockout:
      max-attempts: ${LOCKOUT_MAX_ATTEMPTS:5}
      duration-minutes: ${LOCKOUT_DURATION_MINUTES:15}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
