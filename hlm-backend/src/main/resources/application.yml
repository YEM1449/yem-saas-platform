spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hlm}
    username: ${DB_USER:hlm_user}
    password: ${DB_PASSWORD:hlm_pwd}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: public

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

security:
  jwt:
    secret: ${JWT_SECRET}
    ttl-seconds: ${JWT_TTL_SECONDS:3600}
