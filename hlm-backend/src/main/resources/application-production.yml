server:
  # Production: TLS is terminated at Nginx; Spring Boot listens plain HTTP.
  # Set FORWARD_HEADERS_STRATEGY=FRAMEWORK to trust X-Forwarded-Proto from Nginx.
  forward-headers-strategy: FRAMEWORK
  ssl:
    enabled: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    security.auth: WARN
    security.tenant: WARN
    security.ratelimit: WARN
