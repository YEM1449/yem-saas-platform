databaseChangeLog:
  - changeSet:
      id: 001-init-tenant-user
      author: yem
      changes:

        - createTable:
            tableName: tenant
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: key
                  type: varchar(80)
                  constraints:
                    nullable: false

              - column:
                  name: name
                  type: varchar(160)
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: tenant
            columnNames: key
            constraintName: uk_tenant_key

        - createTable:
            tableName: app_user
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: tenant_id
                  type: uuid
                  constraints:
                    nullable: false

              - column:
                  name: email
                  type: varchar(190)
                  constraints:
                    nullable: false

              - column:
                  name: password_hash
                  type: varchar(255)
                  constraints:
                    nullable: false

              - column:
                  name: enabled
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: app_user
            baseColumnNames: tenant_id
            referencedTableName: tenant
            referencedColumnNames: id
            constraintName: fk_user_tenant
            onDelete: RESTRICT

        - addUniqueConstraint:
            tableName: app_user
            columnNames: tenant_id, email
            constraintName: uk_user_tenant_email
