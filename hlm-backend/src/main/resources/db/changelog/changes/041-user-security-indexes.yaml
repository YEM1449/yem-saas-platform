databaseChangeLog:

  - changeSet:
      id: 041-idx-aus-societe-actif
      author: YEM1449
      preConditions:
        onFail: MARK_RAN
        not:
          indexExists:
            indexName: idx_aus_societe_actif
      changes:
        - createIndex:
            indexName: idx_aus_societe_actif
            tableName: app_user_societe
            columns:
              - column:
                  name: societe_id
              - column:
                  name: actif

