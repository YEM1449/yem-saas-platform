databaseChangeLog:
  - changeSet:
      id: 010-fix-seed-owner-role
      author: crm-hlm
      comment: >
        Fix seeded tenant owner (admin@acme.com) role from default ROLE_AGENT to ROLE_ADMIN.
        Changeset 008 added the role column with default ROLE_AGENT, so the pre-existing
        seeded user was left as ROLE_AGENT. This update corrects the owner to ROLE_ADMIN.
      changes:
        - update:
            tableName: app_user
            columns:
              - column:
                  name: role
                  value: ROLE_ADMIN
            where: >-
              id = '22222222-2222-2222-2222-222222222222'
              AND tenant_id = '11111111-1111-1111-1111-111111111111'
