databaseChangeLog:
  - changeSet:
      id: 030-update-seed-password
      author: crm-hlm
      comment: >
        Update seed admin password to comply with StrongPassword policy
        (minimum 12 chars, upper, lower, digit, special character).
        Old password Admin123! was 9 chars and did not meet the 12-char minimum.
        New password: Admin123!Secure (BCrypt strength 10, $2b$ prefix accepted by Spring Security 6.x)
      changes:
        - update:
            tableName: app_user
            columns:
              - column:
                  name: password_hash
                  # password: Admin123!Secure
                  value: "$2b$10$KDkbgZs.zTRyZVZrV4QkEOG9ZeqPTdndHwTIPVBIvEZLU1Dsg3VjK"
            where: "id = '22222222-2222-2222-2222-222222222222'"
