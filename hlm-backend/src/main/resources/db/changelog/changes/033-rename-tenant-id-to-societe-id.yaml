databaseChangeLog:

  # ── contact ─────────────────────────────────────────────────────────────────
  - changeSet:
      id: 033-rename-tenant-to-societe-contact
      author: YEM1449
      preConditions:
        onFail: MARK_RAN
        columnExists:
          tableName: contact
          columnName: tenant_id
      changes:
        - addColumn:
            tableName: contact
            columns:
              - column:
                  name: societe_id
                  type: UUID
        - sql:
            sql: >
              UPDATE contact
              SET societe_id = COALESCE(tenant_id, '00000000-0000-0000-0000-000000000001');
        - addNotNullConstraint:
            tableName: contact
            columnName: societe_id
        - addForeignKeyConstraint:
            baseTableName: contact
            baseColumnNames: societe_id
            referencedTableName: societe
            referencedColumnNames: id
            constraintName: fk_contact_societe
        - dropColumn:
            tableName: contact
            columnName: tenant_id

