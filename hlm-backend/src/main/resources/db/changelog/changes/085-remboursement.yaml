databaseChangeLog:
  - changeSet:
      id: 085-remboursement
      author: yem-review-f028
      comment: >
        Finding #028 — refund tracking. After a rétractation/annulation, the deposit's return
        was untracked (no field, no event, no document). Adds: (a) remboursement table (1:1 with
        vente) recording montant / moyen / statut / date — RLS-protected; (b) vente.montant_depot
        so the dépôt de garantie validated at confirmReservation is actually persisted and gives
        the refund a sensible default amount.
      changes:
        - addColumn:
            tableName: vente
            columns:
              - column:
                  name: montant_depot
                  type: NUMERIC(15,2)

        - createTable:
            tableName: remboursement
            columns:
              - column: { name: id, type: uuid, constraints: { primaryKey: true, nullable: false } }
              - column:
                  name: societe_id
                  type: uuid
                  constraints: { nullable: false, foreignKeyName: fk_remb_societe, references: societe(id) }
              - column:
                  name: vente_id
                  type: uuid
                  constraints: { nullable: false, foreignKeyName: fk_remb_vente, references: vente(id) }
              - column: { name: montant,  type: "NUMERIC(15,2)", constraints: { nullable: false } }
              - column: { name: moyen,     type: VARCHAR(20) }
              - column:
                  name: statut
                  type: VARCHAR(20)
                  defaultValue: DU
                  constraints: { nullable: false }
              - column: { name: reference,         type: VARCHAR(100) }
              - column: { name: motif,             type: VARCHAR(200) }
              - column: { name: date_remboursement, type: date }
              - column: { name: created_by,        type: uuid }
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: now()
                  constraints: { nullable: false }
              - column:
                  name: updated_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: now()
                  constraints: { nullable: false }

        - addUniqueConstraint:
            tableName: remboursement
            columnNames: vente_id
            constraintName: uk_remb_vente

        - createIndex:
            tableName: remboursement
            indexName: idx_remb_societe_statut
            columns:
              - column: { name: societe_id }
              - column: { name: statut }

        - sql:
            comment: "Enable RLS on remboursement"
            sql: "ALTER TABLE remboursement ENABLE ROW LEVEL SECURITY"

        - sql:
            comment: "Société-scoped RLS policy (nil-UUID system bypass)"
            sql: >-
              CREATE POLICY remboursement_societe_isolation ON remboursement
              USING (
                societe_id = NULLIF(current_setting('app.current_societe_id', TRUE), '')::uuid
                OR societe_id = '00000000-0000-0000-0000-000000000000'::uuid
              )
