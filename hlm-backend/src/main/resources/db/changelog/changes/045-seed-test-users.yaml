databaseChangeLog:
  - changeSet:
      id: 045-seed-test-users
      author: YEM1449
      comment: >
        Add seed users for each company role (MANAGER and AGENT) in the default société
        (11111111-1111-1111-1111-111111111111 / ACME Immobilier).
        Existing admin@acme.com (ADMIN) was seeded in changeset 002.

        Credentials:
          manager@demo.ma  / Manager123!Sec   (ROLE_MANAGER)
          agent@demo.ma    / Agent123!Secure  (ROLE_AGENT)

      preConditions:
        - onFail: MARK_RAN
          sqlCheck:
            expectedResult: 0
            sql: SELECT COUNT(*) FROM app_user WHERE email IN ('manager@demo.ma', 'agent@demo.ma')

      changes:

        # ── MANAGER user ───────────────────────────────────────────────────────────

        - insert:
            tableName: app_user
            columns:
              - column: { name: id,            value: "22222222-2222-2222-2222-222222222223" }
              - column: { name: email,          value: "manager@demo.ma" }
              - column: { name: password_hash,  value: "$2b$10$JhDwawhjUFuRHa9.UehIJubnyjOh9zsUhC5Kn9sH85hlsKMNIAVh." }
                # password: Manager123!Sec
              - column: { name: enabled,        valueBoolean: true }
              - column: { name: prenom,         value: "Sarah" }
              - column: { name: nom_famille,    value: "Manager" }

        - insert:
            tableName: app_user_societe
            columns:
              - column: { name: user_id,    value: "22222222-2222-2222-2222-222222222223" }
              - column: { name: societe_id, value: "11111111-1111-1111-1111-111111111111" }
              - column: { name: role,       value: "MANAGER" }
              - column: { name: actif,      valueBoolean: true }

        # ── AGENT user ────────────────────────────────────────────────────────────

        - insert:
            tableName: app_user
            columns:
              - column: { name: id,            value: "22222222-2222-2222-2222-222222222224" }
              - column: { name: email,          value: "agent@demo.ma" }
              - column: { name: password_hash,  value: "$2b$10$x1EWgIu0JmKCmb1v/tIfGejSQB84HuuEF8ftj9EhUDNipwFYAe.vK" }
                # password: Agent123!Secure
              - column: { name: enabled,        valueBoolean: true }
              - column: { name: prenom,         value: "Omar" }
              - column: { name: nom_famille,    value: "Agent" }

        - insert:
            tableName: app_user_societe
            columns:
              - column: { name: user_id,    value: "22222222-2222-2222-2222-222222222224" }
              - column: { name: societe_id, value: "11111111-1111-1111-1111-111111111111" }
              - column: { name: role,       value: "AGENT" }
              - column: { name: actif,      valueBoolean: true }
