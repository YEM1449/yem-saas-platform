databaseChangeLog:

  - changeSet:
      id: 043-societe-plan-abonnement
      author: YEM1449
      preConditions:
        onFail: MARK_RAN
        not:
          columnExists:
            tableName: societe
            columnName: plan_abonnement
      changes:
        - addColumn:
            tableName: societe
            columns:
              - column:
                  name: plan_abonnement
                  type: VARCHAR(50)
                  defaultValue: STARTER

