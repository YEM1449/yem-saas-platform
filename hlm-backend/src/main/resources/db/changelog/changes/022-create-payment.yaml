databaseChangeLog:
  - changeSet:
      id: 022-create-payment
      author: yem
      comment: >
        Payment (cash-in) table.
        Records actual money received against a payment call.
        Multiple partial payments per call are supported.
      changes:
        - createTable:
            tableName: payment
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: payment_call_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: amount_received
                  type: DECIMAL(15,2)
                  constraints:
                    nullable: false
              - column:
                  name: received_at
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: method
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: reference
                  type: VARCHAR(100)
              - column:
                  name: notes
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: payment
            baseColumnNames: tenant_id
            referencedTableName: tenant
            referencedColumnNames: id
            constraintName: fk_payment_tenant
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: payment
            baseColumnNames: payment_call_id
            referencedTableName: payment_call
            referencedColumnNames: id
            constraintName: fk_payment_call
            onDelete: CASCADE

        - createIndex:
            indexName: idx_payment_tenant_call
            tableName: payment
            columns:
              - column:
                  name: tenant_id
              - column:
                  name: payment_call_id
