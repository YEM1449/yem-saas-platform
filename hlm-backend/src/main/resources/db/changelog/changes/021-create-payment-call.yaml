databaseChangeLog:
  - changeSet:
      id: 021-create-payment-call
      author: yem
      comment: >
        Payment Call (Appel de Fonds) table.
        Each tranche can generate a payment call that is issued to the buyer.
        Status: DRAFT → ISSUED → OVERDUE (scheduler) → CLOSED (when fully paid).
      changes:
        - createTable:
            tableName: payment_call
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: tranche_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: call_number
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: amount_due
                  type: DECIMAL(15,2)
                  constraints:
                    nullable: false
              - column:
                  name: issued_at
                  type: TIMESTAMP
              - column:
                  name: due_date
                  type: DATE
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: DRAFT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: payment_call
            baseColumnNames: tenant_id
            referencedTableName: tenant
            referencedColumnNames: id
            constraintName: fk_pc_tenant
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: payment_call
            baseColumnNames: tranche_id
            referencedTableName: payment_tranche
            referencedColumnNames: id
            constraintName: fk_pc_tranche
            onDelete: CASCADE

        - createIndex:
            indexName: idx_pc_tenant_status
            tableName: payment_call
            columns:
              - column:
                  name: tenant_id
              - column:
                  name: status

        - createIndex:
            indexName: idx_pc_tenant_tranche
            tableName: payment_call
            columns:
              - column:
                  name: tenant_id
              - column:
                  name: tranche_id

        - createIndex:
            indexName: idx_pc_tenant_due_date
            tableName: payment_call
            columns:
              - column:
                  name: tenant_id
              - column:
                  name: due_date
