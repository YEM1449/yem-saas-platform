databaseChangeLog:
  - changeSet:
      id: "051-rls-phase2-all-tables"
      author: "wave4-hardening"
      comment: >
        Phase 2 RLS: (a) Recreate contact/property policies with nil-UUID system bypass
        so cross-société schedulers work correctly. (b) Extend RLS to all remaining
        domain tables that carry societe_id. Defense-in-depth — application-layer
        isolation (SocieteContext + WHERE clauses) remains the primary mechanism.

        Policy logic:
          • sid = nil-UUID (00000000-…) → all rows visible (system/scheduler bypass)
          • sid = real UUID             → only rows where societe_id matches
          • sid not set / NULL          → no rows (should never happen in production)

        Tables covered: contact, property (updated), project, property_reservation,
        sale_contract, deposit, commission_rule, task, document, notification,
        property_media, payment_schedule, payment_call, payment.
        Excluded: outbound_message, portal_token, app_user, societe, app_user_societe
        (no per-request societe_id filter needed on these infrastructure tables).
      changes:
        - sql:
            sql: |
              -- ────────────────────────────────────────────────────────────────────
              -- Helper: create a standard isolation policy on a given table.
              -- Nil-UUID (00000000-…) is the system/scheduler bypass sentinel.
              -- ────────────────────────────────────────────────────────────────────

              -- CONTACT (update: drop old policy, recreate with bypass)
              DROP POLICY IF EXISTS societe_isolation_contact ON contact;
              CREATE POLICY societe_isolation_contact ON contact
                USING (
                  current_setting('app.current_societe_id', true) = '00000000-0000-0000-0000-000000000000'
                  OR (
                    current_setting('app.current_societe_id', true) IS NOT NULL
                    AND current_setting('app.current_societe_id', true) <> ''
                    AND societe_id = current_setting('app.current_societe_id', true)::uuid
                  )
                )
                WITH CHECK (
                  current_setting('app.current_societe_id', true) = '00000000-0000-0000-0000-000000000000'
                  OR (
                    current_setting('app.current_societe_id', true) IS NOT NULL
                    AND current_setting('app.current_societe_id', true) <> ''
                    AND societe_id = current_setting('app.current_societe_id', true)::uuid
                  )
                );

