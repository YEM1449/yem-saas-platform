spring:
  datasource:
    url: jdbc:postgresql://db.<PROJECT_REF>.supabase.co:5432/postgres?sslmode=require
    username: postgres
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  liquibase:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
