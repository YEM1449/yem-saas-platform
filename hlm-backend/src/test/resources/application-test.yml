spring:
  jpa:
    properties:
      hibernate:
        generate_statistics: true
  liquibase:
    enabled: true
  task:
    scheduling:
      enabled: false

logging:
  level:
    org.hibernate.stat: DEBUG
    org.hibernate.SQL: DEBUG

security:
  jwt:
    secret: "0123456789abcdef0123456789abcdef01234567"
    ttl-seconds: 3600

app:
  cookie:
    secure: false  # Tests run over plain HTTP; Secure=true would prevent Set-Cookie from being observed
  media:
    storage-dir: ${java.io.tmpdir}/hlm-test-media
    max-file-size: 10485760
    allowed-types: image/jpeg,image/png,image/webp,application/pdf
  rate-limit:
    portal-link:
      capacity: 10000
      refill-period: PT1H
  security:
    rate-limit:
      login:
        ip-max: 1000
        key-max: 1000
        window-seconds: 3600
    lockout:
      max-attempts: 10
      duration-minutes: 1
