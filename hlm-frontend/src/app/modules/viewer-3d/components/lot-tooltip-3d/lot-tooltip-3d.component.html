<div class="tooltip-3d" [style.left.px]="x + 16" [style.top.px]="y - 8">
  <div class="tooltip-header">
    <span class="lot-ref">{{ mapping?.lotRef ?? '—' }}</span>
    <span class="status-chip" [style.background]="statusColor">{{ statusLabel }}</span>
  </div>
  <div class="tooltip-row" *ngIf="mapping?.typology">
    <span class="label">Typologie</span>
    <span class="value">{{ mapping.typology }}</span>
  </div>
  <div class="tooltip-row" *ngIf="status?.surface">
    <span class="label">Surface</span>
    <span class="value">{{ status.surface | number:'1.0-1' }} m²</span>
  </div>
  <div class="tooltip-row" *ngIf="status?.prix">
    <span class="label">Prix</span>
    <span class="value price">{{ formattedPrice }}</span>
  </div>
</div>
