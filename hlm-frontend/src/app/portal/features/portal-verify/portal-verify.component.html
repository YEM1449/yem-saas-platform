<div class="portal-auth-page" data-testid="portal-verify-page">
  <div class="portal-auth-card">

    <div class="portal-auth-brand">
      <div class="portal-auth-logo" aria-hidden="true">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </div>
      <h1 class="portal-auth-title">{{ 'portal.verify.brand' | translate }}</h1>
    </div>

    @if (state() === 'verifying') {
      <div class="portal-verify-state" data-testid="portal-verifying-message">
        <div class="portal-spinner" aria-hidden="true"></div>
        <p class="portal-verify-message">{{ 'portal.verify.verifying' | translate }}</p>
        <p class="portal-verify-hint">{{ 'portal.verify.redirect' | translate }}</p>
      </div>
    }

    @if (state() === 'error') {
      <div class="portal-verify-state" data-testid="portal-verify-error">
        <div class="portal-error-icon" aria-hidden="true">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        </div>
        <p class="portal-verify-message portal-verify-message--error" data-testid="portal-verify-error-text">
          {{ error() }}
        </p>
        <button class="portal-btn-primary" (click)="goToLogin()" data-testid="portal-verify-retry">
          {{ 'portal.verify.retry' | translate }}
        </button>
      </div>
    }

  </div>
</div>
