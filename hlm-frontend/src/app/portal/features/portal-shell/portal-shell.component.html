<div class="portal-layout">

  <!-- ── Sticky top header ──────────────────────────────────────── -->
  <header class="portal-header" role="banner">
    <div class="portal-header-inner">

      <!-- Brand -->
      <div class="portal-brand">
        <div class="portal-brand-icon" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </div>
        <span class="portal-brand-name">
          {{ tenantInfo()?.tenantName ?? ('portal.shell.brandFallback' | translate) }}
        </span>
      </div>

      <!-- Primary nav -->
      <nav class="portal-nav" role="navigation" [attr.aria-label]="'portal.shell.navAria' | translate">
        <a routerLink="/portal/ventes" routerLinkActive="active"
           [routerLinkActiveOptions]="{ exact: false }" class="portal-nav-link">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
          </svg>
          {{ 'portal.shell.navMySales' | translate }}
        </a>
        <a routerLink="/portal/contracts" routerLinkActive="active"
           [routerLinkActiveOptions]="{ exact: false }" class="portal-nav-link">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
          </svg>
          {{ 'portal.shell.navMyContracts' | translate }}
        </a>
      </nav>

      <!-- Logout -->
      <div class="portal-header-actions">
        <button class="portal-logout-btn" (click)="logout()"
                [attr.aria-label]="'portal.shell.logoutAria' | translate">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          <span class="portal-logout-label">{{ 'portal.shell.logout' | translate }}</span>
        </button>
      </div>

    </div>
  </header>

  <!-- ── Page content ───────────────────────────────────────────── -->
  <main class="portal-main" role="main">
    <router-outlet />
  </main>

  <!-- ── Footer ─────────────────────────────────────────────────── -->
  <footer class="portal-footer" role="contentinfo">
    <p class="portal-footer-text">
      {{ 'portal.shell.footer' | translate }}
      @if (tenantInfo()?.tenantName) { — {{ tenantInfo()!.tenantName }} }
    </p>
  </footer>

</div>
