<div class="shortcuts">
  <a routerLink="/app/contacts" class="sc sc-contacts">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <circle cx="9" cy="6" r="3" stroke="currentColor" stroke-width="1.6"/>
      <path d="M2.5 16c0-3 2.5-5 6.5-5s6.5 2 6.5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
    </svg>
    Contacts
  </a>
  <a routerLink="/app/properties" class="sc sc-properties">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <path d="M2.5 8.5L9 2.5l6.5 6V16H12v-4.5H6.5V16H2.5V8.5z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
    </svg>
    Biens
  </a>
  <a routerLink="/app/reservations" class="sc sc-reservations">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <rect x="2" y="3.5" width="14" height="12" rx="1.5" stroke="currentColor" stroke-width="1.6"/>
      <path d="M12 2v3M6 2v3M2 8.5h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
    </svg>
    Réservations
  </a>
  <a routerLink="/app/ventes" class="sc sc-ventes">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <path d="M2.5 15l4.5-5.5 3.5 3 3.5-6 4 3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Ventes
  </a>
  <a routerLink="/app/projects" class="sc sc-projects">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <rect x="2" y="2" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.6"/>
      <rect x="10" y="2" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.6"/>
      <rect x="2" y="10" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.6"/>
      <rect x="10" y="10" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.6"/>
    </svg>
    Projets
  </a>
  <a routerLink="/app/tasks" class="sc sc-tasks">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <path d="M6.5 9l2.5 2.5 4.5-4.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="2.5" y="2.5" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.6"/>
    </svg>
    Tâches
  </a>
  @if (isAdminOrManager) {
    <a routerLink="/app/dashboard/commercial" class="sc sc-commercial">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <rect x="2" y="10" width="3.5" height="6" rx="1" fill="currentColor"/>
        <rect x="7" y="6.5" width="3.5" height="9.5" rx="1" fill="currentColor"/>
        <rect x="12.5" y="3" width="3.5" height="13" rx="1" fill="currentColor"/>
      </svg>
      Analytics
    </a>
    <a routerLink="/app/dashboard/receivables" class="sc sc-cash">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <rect x="2" y="4.5" width="14" height="10" rx="1.5" stroke="currentColor" stroke-width="1.6"/>
        <circle cx="9" cy="9.5" r="2.5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M6.5 2v2M11.5 2v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      Encaissements
    </a>
  }
</div>
