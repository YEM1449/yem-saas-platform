<div class="form-overlay" (click)="cancel()"></div>
<div class="form-modal">
  <h3>{{ (isEdit ? 'tasks.editTitle' : 'tasks.newTitle') | translate }}</h3>

  @if (error) {
    <p class="error">{{ error }}</p>
  }

  <label>
    {{ 'tasks.fTitre' | translate }} <span class="required">*</span>
    <input data-testid="task-title" type="text" [(ngModel)]="title"
           [placeholder]="'tasks.titrePlaceholder' | translate" maxlength="300" />
  </label>

  <label>
    {{ 'tasks.fDescription' | translate }}
    <textarea [(ngModel)]="description" rows="3" [placeholder]="'tasks.descPlaceholder' | translate"></textarea>
  </label>

  <label>
    {{ 'tasks.fEcheance' | translate }}
    <input type="datetime-local" [(ngModel)]="dueDate" />
  </label>

  <!-- Assignee — name typeahead, UUID never shown -->
  <label>
    {{ 'tasks.assignee' | translate }}
    <app-user-picker
      [placeholder]="'tasks.assigneePlaceholder' | translate"
      [initialId]="assigneeId"
      [disabled]="submitting"
      (userSelected)="onUserSelected($event)" />
    <span class="field-hint">{{ 'tasks.assigneeHint' | translate }}</span>
  </label>

  @if (!isEdit) {
    <!-- Contact — name/email/phone typeahead -->
    <label>
      {{ 'tasks.contactLie' | translate }}
      <app-contact-picker
        [placeholder]="'tasks.contactPlaceholder' | translate"
        [initialId]="contactId"
        [disabled]="submitting"
        (contactSelected)="onContactSelected($event)" />
      <span class="field-hint">{{ 'tasks.contactHint' | translate }}</span>
    </label>

    <!-- Property — inline typeahead (avoids loading the full list) -->
    <label>
      {{ 'tasks.bienLie' | translate }}
      <div style="position:relative">
        <input type="text"
               [(ngModel)]="propertyQuery"
               (ngModelChange)="onPropertyInput()"
               (blur)="closePropertyDrop()"
               [disabled]="submitting"
               [placeholder]="'tasks.bienPlaceholder' | translate"
               autocomplete="off" />
        @if (propertyLoading) {
          <span class="field-hint">{{ 'tasks.searching' | translate }}</span>
        }
        @if (propertyQuery && !propertyId) {
          <button type="button" class="btn-ghost-sm" style="position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:12px;"
                  (click)="clearProperty()">✕</button>
        }
        @if (propertyShowDrop && propertySuggestions.length > 0) {
          <ul class="picker-dropdown" style="position:absolute;z-index:200;background:#fff;border:1px solid #ddd;border-radius:6px;padding:4px 0;list-style:none;margin:0;top:100%;left:0;right:0;max-height:200px;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.08)">
            @for (p of propertySuggestions; track p.id) {
              <li (mousedown)="selectProperty(p)"
                  style="padding:7px 12px;cursor:pointer;font-size:13px;"
                  class="picker-item">
                <strong>{{ p.title }}</strong>
                <span style="color:#888;margin-left:6px;font-size:11px">{{ p.referenceCode }}</span>
              </li>
            }
          </ul>
        }
      </div>
      <span class="field-hint">{{ 'tasks.bienHint' | translate }}</span>
    </label>
  }

  <div class="form-actions">
    <button (click)="cancel()" [disabled]="submitting" class="btn-secondary">{{ 'tasks.cancel' | translate }}</button>
    <button data-testid="task-submit" (click)="submit()" [disabled]="submitting || !title.trim()" class="btn-primary">
      {{ submitting ? ('tasks.saving' | translate) : ((isEdit ? 'tasks.edit' : 'tasks.create') | translate) }}
    </button>
  </div>
</div>
