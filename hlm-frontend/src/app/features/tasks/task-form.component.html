<div class="form-overlay" (click)="cancel()"></div>
<div class="form-modal">
  <h3>{{ isEdit ? ('tasks.editTask' | translate) : ('tasks.newTask' | translate) }}</h3>

  @if (error) {
    <p class="error">{{ error }}</p>
  }

  <label>
    {{ 'tasks.titleLabel' | translate }} <span class="required">*</span>
    <input data-testid="task-title" type="text" [(ngModel)]="title"
           placeholder="Ex: Rappeler le client" maxlength="300" />
  </label>

  <label>
    Description
    <textarea [(ngModel)]="description" rows="3" placeholder="Détails optionnels…"></textarea>
  </label>

  <label>
    {{ 'tasks.dueDate' | translate }}
    <input type="datetime-local" [(ngModel)]="dueDate" />
  </label>

  <!-- Assignee — name typeahead, UUID never shown -->
  <label>
    {{ 'tasks.assignee' | translate }}
    <app-user-picker
      placeholder="Rechercher un collaborateur…"
      [initialId]="assigneeId"
      [disabled]="submitting"
      (userSelected)="onUserSelected($event)" />
    <span class="field-hint">Laissez vide pour vous assigner la tâche automatiquement.</span>
  </label>

  @if (!isEdit) {
    <!-- Contact — name/email/phone typeahead -->
    <label>
      Contact lié
      <app-contact-picker
        placeholder="Rechercher par nom, email ou téléphone…"
        [initialId]="contactId"
        [disabled]="submitting"
        (contactSelected)="onContactSelected($event)" />
      <span class="field-hint">Optionnel — lie la tâche à un contact.</span>
    </label>

    <!-- Property — dropdown, no UUID shown -->
    <label>
      Bien immobilier lié
      @if (propertiesLoading) {
        <span class="field-hint">Chargement des biens…</span>
      } @else {
        <select [(ngModel)]="propertyId" [disabled]="submitting">
          <option value="">— Aucun bien (optionnel) —</option>
          @for (p of properties; track p.id) {
            <option [value]="p.id">{{ p.title }} · {{ p.referenceCode }}</option>
          }
        </select>
      }
      <span class="field-hint">Optionnel — lie la tâche à un bien immobilier.</span>
    </label>
  }

  <div class="form-actions">
    <button (click)="cancel()" [disabled]="submitting" class="btn-secondary">{{ 'common.cancel' | translate }}</button>
    <button data-testid="task-submit" (click)="submit()" [disabled]="submitting || !title.trim()" class="btn-primary">
      {{ submitting ? ('common.saving' | translate) : (isEdit ? ('common.edit' | translate) : ('common.create' | translate)) }}
    </button>
  </div>
</div>
