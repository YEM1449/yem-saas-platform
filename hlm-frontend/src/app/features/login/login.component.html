<div class="login-container">
  <h1>{{ 'login.title' | translate }}</h1>

  @if (!showSocieteSelection) {
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="field">
        <label for="email">{{ 'login.email' | translate }}</label>
        <input id="email" name="email" type="email" [(ngModel)]="form.email" required data-testid="email" />
      </div>

      <div class="field">
        <label for="password">{{ 'login.password' | translate }}</label>
        <input id="password" name="password" type="password" [(ngModel)]="form.password" required data-testid="password" />
      </div>

      @if (error) {
        <p class="error" data-testid="error-message">{{ error }}</p>
      }

      <button type="submit" [disabled]="loading || loginForm.invalid" data-testid="login-button">
        {{ loading ? ('login.submitting' | translate) : ('login.submit' | translate) }}
      </button>
    </form>
  }

  @if (showSocieteSelection) {
    <div class="societe-selection">
      <h2>{{ 'login.selectSociete' | translate }}</h2>
      <p>{{ 'login.selectSocieteDesc' | translate }}</p>

      @for (s of societes; track s.id) {
        <button class="societe-choice" (click)="selectSociete(s.id)" [disabled]="loading">
          {{ s.nom }}
        </button>
      }

      @if (error) {
        <p class="error">{{ error }}</p>
      }

      <button class="back-link" (click)="backToLogin()" [disabled]="loading">
        {{ 'login.back' | translate }}
      </button>
    </div>
  }
</div>
