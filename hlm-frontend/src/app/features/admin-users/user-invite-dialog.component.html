<div class="modal-backdrop" (click)="cancel()">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2 class="modal-title">{{ 'adminUsers.invite.title' | translate }}</h2>
      <button class="modal-close" (click)="cancel()" aria-label="Close">✕</button>
    </div>

    <div class="modal-body">
      @if (error) {
        <div class="alert alert-error">{{ error }}</div>
      }

      <div class="form-group">
        <label class="form-label required">{{ 'adminUsers.invite.email' | translate }}</label>
        <input class="form-control" type="email" [(ngModel)]="email" [placeholder]="'adminUsers.invite.emailPlaceholder' | translate" />
      </div>

      <div class="form-group">
        <label class="form-label required">{{ 'adminUsers.invite.prenom' | translate }}</label>
        <input class="form-control" type="text" [(ngModel)]="prenom" />
      </div>

      <div class="form-group">
        <label class="form-label required">{{ 'adminUsers.invite.nom' | translate }}</label>
        <input class="form-control" type="text" [(ngModel)]="nomFamille" />
      </div>

      <div class="form-group">
        <label class="form-label">{{ 'adminUsers.invite.telephone' | translate }}</label>
        <input class="form-control" type="tel" [(ngModel)]="telephone" [placeholder]="'adminUsers.invite.telephonePlaceholder' | translate" />
      </div>

      <div class="form-group">
        <label class="form-label">{{ 'adminUsers.invite.description' | translate }}</label>
        <input class="form-control" type="text" [(ngModel)]="poste" />
      </div>

      <div class="form-group">
        <label class="form-label required">{{ 'adminUsers.invite.role' | translate }}</label>
        <select class="form-control" [(ngModel)]="role">
          @for (r of availableRoles; track r) {
            <option [value]="r">{{ 'adminUsers.role.' + r | translate }}</option>
          }
        </select>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-secondary" (click)="cancel()" [disabled]="submitting">{{ 'adminUsers.invite.cancel' | translate }}</button>
      <button class="btn btn-primary" (click)="submit()" [disabled]="submitting || !email.trim() || !prenom.trim() || !nomFamille.trim()">
        @if (submitting) { {{ 'adminUsers.invite.sending' | translate }} } @else { {{ 'adminUsers.invite.sendInvite' | translate }} }
      </button>
    </div>
  </div>
</div>
