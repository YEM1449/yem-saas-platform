<div class="sa-layout">
  <aside class="sa-sidebar">
    <div class="sa-brand">
      <span class="sa-brand-icon">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <rect x="3" y="6" width="16" height="13" rx="1.5" stroke="#f59e0b" stroke-width="1.5"/>
          <path d="M8 19v-5h6v5" stroke="#f59e0b" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M3 6l8-4 8 4" stroke="#f59e0b" stroke-width="1.5" stroke-linejoin="round"/>
          <circle cx="17" cy="5" r="3" fill="#f59e0b"/>
          <path d="M16 5h2M17 4v2" stroke="#0f172a" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </span>
      <div class="sa-brand-text">
        <span class="sa-brand-name">HLM CRM</span>
        <span class="sa-brand-sub">SUPER ADMIN</span>
      </div>
    </div>

    <nav class="sa-nav">
      <div class="sa-nav-section-label">GESTION PLATEFORME</div>

      <a routerLink="/superadmin/societes" routerLinkActive="sa-nav-active" class="sa-nav-item">
        <svg class="sa-nav-icon" viewBox="0 0 20 20" fill="none">
          <rect x="2" y="8" width="16" height="10" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M6 18v-4h8v4" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M2 8l8-5 8 5" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
        Sociétés
      </a>

      <div class="sa-nav-section-label">NAVIGATION</div>

      <a routerLink="/app/properties" class="sa-nav-item">
        <svg class="sa-nav-icon" viewBox="0 0 20 20" fill="none">
          <path d="M10 2L2 9h2v9h5v-5h2v5h5V9h2L10 2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
        Retour app
      </a>
    </nav>

    <div class="sa-sidebar-footer">
      <button class="sa-logout-btn" (click)="logout()">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
          <path d="M6 2H3a1 1 0 00-1 1v9a1 1 0 001 1h3M10 5l3 3-3 3M13 8H6"
                stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Se déconnecter
      </button>
    </div>
  </aside>

  <main class="sa-main-content">
    <router-outlet />
  </main>
</div>
