<div class="form-page">
  <div class="page-header">
    <h2 class="page-title">{{ isEdit ? 'Modifier' : 'Nouvelle société' }}</h2>
  </div>

  @if (loading) {
    <div class="skeleton-stack" data-testid="societe-form-loading-state" aria-label="Chargement...">
      <span class="skeleton skeleton-text-lg skeleton-w-50"></span>
      <span class="skeleton skeleton-card" style="height:200px"></span>
      <span class="skeleton skeleton-card" style="height:160px"></span>
    </div>
  }

  @if (error) {
    <div class="alert alert-error">{{ error }}</div>
  }

  @if (!loading) {
    <form class="sa-form" (ngSubmit)="submit()">

      <!-- Identity -->
      <section class="form-section">
        <h3 class="section-title">Informations</h3>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label required">Nom</label>
            <input class="form-control" type="text" [(ngModel)]="nom" name="nom" required />
          </div>
          <div class="form-group">
            <label class="form-label required">Pays</label>
            <select class="form-control" [(ngModel)]="pays" name="pays" required>
              <option value="">—</option>
              <option value="MA">Maroc</option>
              <option value="FR">France</option>
              <option value="TN">Tunisie</option>
              <option value="SN">Sénégal</option>
              <option value="CI">Côte d'Ivoire</option>
              <option value="OTHER">Autre</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Nom commercial</label>
            <input class="form-control" type="text" [(ngModel)]="nomCommercial" name="nomCommercial" />
          </div>
          <div class="form-group">
            <label class="form-label">Forme juridique</label>
            <input class="form-control" type="text" [(ngModel)]="formeJuridique" name="formeJuridique" />
          </div>
        </div>
      </section>

      <!-- GDPR -->
      <section class="form-section">
        <h3 class="section-title">RGPD</h3>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Email DPO</label>
            <input class="form-control" type="email" [(ngModel)]="emailDpo" name="emailDpo" />
          </div>
          <div class="form-group">
            <label class="form-label">Nom DPO</label>
            <input class="form-control" type="text" [(ngModel)]="dpoNom" name="dpoNom" />
          </div>
          <div class="form-group">
            <label class="form-label">Numéro CNDP</label>
            <input class="form-control" type="text" [(ngModel)]="numeroCndp" name="numeroCndp" />
          </div>
          <div class="form-group">
            <label class="form-label">Numéro CNIL</label>
            <input class="form-control" type="text" [(ngModel)]="numeroCnil" name="numeroCnil" />
          </div>
          <div class="form-group">
            <label class="form-label">Base juridique</label>
            <input class="form-control" type="text" [(ngModel)]="baseJuridiqueDefaut" name="baseJuridiqueDefaut" />
          </div>
        </div>
      </section>

      <!-- Subscription -->
      <section class="form-section">
        <h3 class="section-title">Abonnement</h3>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Plan</label>
            <select class="form-control" [(ngModel)]="planAbonnement" name="planAbonnement">
              <option value="STARTER">STARTER</option>
              <option value="PRO">PRO</option>
              <option value="ENTERPRISE">ENTERPRISE</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Max Utilisateurs</label>
            <input class="form-control" type="number" [(ngModel)]="maxUtilisateurs" name="maxUtilisateurs" min="1" />
          </div>
          <div class="form-group">
            <label class="form-label">Max biens</label>
            <input class="form-control" type="number" [(ngModel)]="maxBiens" name="maxBiens" min="1" />
          </div>
        </div>
      </section>

      <!-- Internal notes -->
      <section class="form-section">
        <h3 class="section-title">Notes</h3>
        <div class="form-group">
          <textarea class="form-control" [(ngModel)]="notesInternes" name="notesInternes" rows="4"></textarea>
        </div>
      </section>

      <div class="modal-footer" style="padding:0">
        <button type="button" class="btn btn-secondary" (click)="cancel()">Annuler</button>
        <button type="submit" class="btn btn-primary" [disabled]="saving">
          @if (saving) { Enregistrement... } @else { Enregistrer }
        </button>
      </div>

    </form>
  }
</div>
