<div class="picker-wrap">
  <div class="picker-input-row">
    <input class="picker-input"
           type="text"
           [placeholder]="selectedName ? selectedName : placeholder"
           [(ngModel)]="query"
           (input)="onInput()"
           (blur)="closeDropdown()"
           [disabled]="disabled"
           autocomplete="off" />
    @if (selectedId && !disabled) {
      <button class="picker-clear" type="button" (click)="clear()" title="Effacer">✕</button>
    }
    @if (loading) {
      <span class="picker-spinner"></span>
    }
  </div>

  @if (showDropdown && suggestions.length > 0) {
    <ul class="picker-dropdown" role="listbox">
      @for (u of suggestions; track u.id) {
        <li class="picker-option"
            role="option"
            (mousedown)="select(u)">
          <span class="picker-option-name">{{ u.displayName }}</span>
          <span class="picker-option-sub">{{ u.email }}</span>
        </li>
      }
    </ul>
  }
</div>
